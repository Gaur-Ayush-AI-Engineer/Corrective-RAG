<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f3ee"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Corrective RAG With LangGraph</text>

  <!-- ===== TOP PANEL: Notebook Progression ===== -->
  <rect x="40" y="70" width="1120" height="220" rx="14" fill="#fcfbf8" stroke="#d6d3d1" stroke-width="1.5"/>
  <text x="65" y="100" font-size="15" font-weight="700" fill="#111827">Notebook Progression</text>

  <!-- NB1 -->
  <rect x="60" y="115" width="175" height="150" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="147" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">1. Basic RAG</text>
  <text x="147" y="162" text-anchor="middle" font-size="12" fill="#334155">Load PDFs</text>
  <text x="147" y="180" text-anchor="middle" font-size="12" fill="#334155">Split into chunks</text>
  <text x="147" y="198" text-anchor="middle" font-size="12" fill="#334155">Retrieve matches</text>
  <text x="147" y="216" text-anchor="middle" font-size="12" fill="#334155">Generate answer</text>

  <!-- Arrow 1->2 -->
  <path d="M235 190 H265" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- NB2 -->
  <rect x="265" y="115" width="175" height="150" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="352" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">2. Refinement</text>
  <text x="352" y="162" text-anchor="middle" font-size="12" fill="#334155">Split context into</text>
  <text x="352" y="180" text-anchor="middle" font-size="12" fill="#334155">sentences</text>
  <text x="352" y="198" text-anchor="middle" font-size="12" fill="#334155">Keep useful strips</text>
  <text x="352" y="216" text-anchor="middle" font-size="12" fill="#334155">Answer from refined</text>

  <!-- Arrow 2->3 -->
  <path d="M440 190 H470" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- NB3 -->
  <rect x="470" y="115" width="175" height="150" rx="10" fill="#fff8f0" stroke="#c2410c" stroke-width="2"/>
  <text x="557" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">3. Evaluator</text>
  <text x="557" y="162" text-anchor="middle" font-size="12" fill="#334155">Score each chunk</text>
  <text x="557" y="180" text-anchor="middle" font-size="12" fill="#334155">Route by quality</text>
  <text x="557" y="198" text-anchor="middle" font-size="12" fill="#334155">Correct / Incorrect</text>
  <text x="557" y="216" text-anchor="middle" font-size="12" fill="#334155">/ Ambiguous</text>

  <!-- Arrow 3->4 -->
  <path d="M645 190 H675" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- NB4 -->
  <rect x="675" y="115" width="175" height="150" rx="10" fill="#f8fbff" stroke="#2563eb" stroke-width="2"/>
  <text x="762" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">4. Web Fallback</text>
  <text x="762" y="162" text-anchor="middle" font-size="12" fill="#334155">Poor retrieval?</text>
  <text x="762" y="180" text-anchor="middle" font-size="12" fill="#334155">Search the web</text>
  <text x="762" y="198" text-anchor="middle" font-size="12" fill="#334155">Convert to docs</text>
  <text x="762" y="216" text-anchor="middle" font-size="12" fill="#334155">Refine and answer</text>

  <!-- Arrow 4->5 -->
  <path d="M850 190 H880" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- NB5 -->
  <rect x="880" y="115" width="175" height="150" rx="10" fill="#f8fbff" stroke="#2563eb" stroke-width="2"/>
  <text x="967" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">5. Query Rewrite</text>
  <text x="967" y="162" text-anchor="middle" font-size="12" fill="#334155">Rewrite question</text>
  <text x="967" y="180" text-anchor="middle" font-size="12" fill="#334155">into keyword query</text>
  <text x="967" y="198" text-anchor="middle" font-size="12" fill="#334155">Better web search</text>
  <text x="967" y="216" text-anchor="middle" font-size="12" fill="#334155">results</text>

  <!-- Arrow 5->6 (down) -->
  <path d="M967 265 V285" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- NB6 (below NB5) -->
  <rect x="855" y="285" width="245" height="110" rx="10" fill="#f3fbf5" stroke="#15803d" stroke-width="2"/>
  <text x="977" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">6. Ambiguous Handling</text>
  <text x="977" y="330" text-anchor="middle" font-size="12" fill="#334155">Keep weak internal chunks</text>
  <text x="977" y="350" text-anchor="middle" font-size="12" fill="#334155">Combine with web results</text>
  <text x="977" y="370" text-anchor="middle" font-size="12" fill="#334155">Refine merged evidence</text>

  <!-- ===== BOTTOM PANEL: Final Flow ===== -->
  <rect x="40" y="420" width="1120" height="460" rx="14" fill="#fcfbf8" stroke="#d6d3d1" stroke-width="1.5"/>
  <text x="65" y="450" font-size="15" font-weight="700" fill="#111827">Final Decision Flow (Notebook 6)</text>

  <!-- Step 1: Load & Index -->
  <rect x="60" y="465" width="160" height="90" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="140" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Load &amp; Index</text>
  <text x="140" y="512" text-anchor="middle" font-size="12" fill="#334155">PDFs → chunks</text>
  <text x="140" y="530" text-anchor="middle" font-size="12" fill="#334155">Embed → FAISS</text>

  <!-- Arrow -->
  <path d="M220 510 H255" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Step 2: Retrieve -->
  <rect x="255" y="465" width="160" height="90" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="335" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Retrieve Top 4</text>
  <text x="335" y="512" text-anchor="middle" font-size="12" fill="#334155">Similarity search</text>
  <text x="335" y="530" text-anchor="middle" font-size="12" fill="#334155">over vector index</text>

  <!-- Arrow -->
  <path d="M415 510 H455" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Step 3: Evaluate -->
  <rect x="455" y="455" width="210" height="110" rx="10" fill="#fff8f0" stroke="#c2410c" stroke-width="2"/>
  <text x="560" y="480" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Evaluate Chunks</text>
  <text x="560" y="500" text-anchor="middle" font-size="12" fill="#334155">LLM scores 0.0–1.0</text>
  <text x="560" y="518" text-anchor="middle" font-size="12" fill="#334155">good_docs = score &gt; 0.3</text>
  <text x="560" y="536" text-anchor="middle" font-size="12" fill="#334155">Upper: 0.7 / Lower: 0.3</text>

  <!-- Three branches down from Evaluate -->
  <!-- CORRECT branch -->
  <path d="M490 565 V600 H175 V635" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="310" y="597" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">CORRECT</text>

  <!-- INCORRECT branch -->
  <path d="M560 565 V600 V635" stroke="#be123c" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="590" y="597" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">INCORRECT</text>

  <!-- AMBIGUOUS branch -->
  <path d="M630 565 V600 H960 V635" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="810" y="597" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">AMBIGUOUS</text>

  <!-- CORRECT box -->
  <rect x="60" y="635" width="230" height="110" rx="10" fill="#f3fbf5" stroke="#15803d" stroke-width="2"/>
  <text x="175" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Use Internal Only</text>
  <text x="175" y="680" text-anchor="middle" font-size="12" fill="#334155">Score ≥ 0.7 found</text>
  <text x="175" y="698" text-anchor="middle" font-size="12" fill="#334155">Use good_docs only</text>
  <text x="175" y="716" text-anchor="middle" font-size="12" fill="#334155">No web search needed</text>

  <!-- INCORRECT box -->
  <rect x="445" y="635" width="230" height="110" rx="10" fill="#fff5f5" stroke="#be123c" stroke-width="2"/>
  <text x="560" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Use Web Only</text>
  <text x="560" y="680" text-anchor="middle" font-size="12" fill="#334155">All scores &lt; 0.3</text>
  <text x="560" y="698" text-anchor="middle" font-size="12" fill="#334155">Rewrite query</text>
  <text x="560" y="716" text-anchor="middle" font-size="12" fill="#334155">Search Tavily</text>

  <!-- AMBIGUOUS box -->
  <rect x="840" y="635" width="240" height="110" rx="10" fill="#f8fbff" stroke="#2563eb" stroke-width="2"/>
  <text x="960" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Combine Internal + Web</text>
  <text x="960" y="680" text-anchor="middle" font-size="12" fill="#334155">No score ≥ 0.7</text>
  <text x="960" y="698" text-anchor="middle" font-size="12" fill="#334155">Keep good_docs</text>
  <text x="960" y="716" text-anchor="middle" font-size="12" fill="#334155">Add web_docs</text>

  <!-- Arrows from INCORRECT and AMBIGUOUS to Refine+Generate -->
  <path d="M560 745 V775" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M960 745 V760 H710 V775" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Refine + Generate box -->
  <rect x="420" y="775" width="355" height="80" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="597" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Refine → Generate Answer</text>
  <text x="597" y="822" text-anchor="middle" font-size="12" fill="#334155">Sentence filter removes noise</text>
  <text x="597" y="840" text-anchor="middle" font-size="12" fill="#334155">Final answer from refined context</text>

  <!-- Arrow from CORRECT to Generate (skip refine) -->
  <path d="M175 745 V855 H420" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
</svg>
